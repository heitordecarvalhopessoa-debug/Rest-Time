<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Time</title>
    <link rel="stylesheet" href="src/css/base.css">
    <link rel="stylesheet" href="src/css/tools-palette.css">
    <link rel="stylesheet" href="src/css/ui-controls.css">
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="card">
            <h1>Rest Time</h1>
            <input type="text" id="username-input" placeholder="What is your name?">
            <button id="start-btn">Enter Space</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="hotbar">
            <div class="hotbar-group">
                <span id="user-display" class="user-text"></span>
                <span class="divider">·</span>
                <span id="timer-display" class="timer-text">00:00</span>
            </div>
            <button id="change-name-btn" title="Change Name" class="logout-icon-btn">✎</button>
            <button id="logout-btn" title="Logout" class="logout-icon-btn">&times;</button>
        </div>

        <div class="left-controls-column">
            <button id="music-menu-toggle-btn" class="control-btn">♫ MUSIC</button>
            <button id="layout-menu-toggle-btn" class="control-btn" title="Saved Layouts">➢ LAYOUTS</button>
            <button id="pause-btn" class="control-btn">⏸ PAUSE</button>
            <button id="eraser-btn" class="control-btn">⌫ ERASER</button>
            <div id="fps-display" class="fps-counter-tag">FPS: 0</div>
        </div>

        <div id="eraser-cursor"></div>

        <div id="music-box-panel" class="music-box closed" onclick="event.stopPropagation()">
            <div class="music-box-header">
                <span class="music-panel-title">MUSIC BOX</span>
            </div>
            
            <div id="music-playlist" class="playlist-container">
                <div class="no-tracks-hint">No tracks added yet.</div>
            </div>

            <label for="music-upload" class="music-upload-btn">＋ Add Music File</label>
            <input type="file" id="music-upload" accept="audio/*" style="display: none;">

            <div class="palette-divider"></div>

            <div class="music-controls-row">
                <button id="music-play-btn" class="music-ctrl-btn" disabled>▶</button>
                <div class="music-volume-container">
                    <span class="music-sign">-</span>
                    <div class="volume-slider-wrapper">
                        <input type="range" id="music-volume-slider" min="0" max="100" value="50">
                    </div>
                    <span class="music-sign">+</span>
                </div>
            </div>
            
            <audio id="bg-audio" loop></audio>
        </div>

        <div id="version-display" class="version-tag"></div>

        <button id="palette-toggle-btn" class="palette-toggle">
            <span class="toggle-icon"></span>
        </button>

        <div id="side-palette" class="color-palette closed" onclick="event.stopPropagation()">
            <div class="palette-row">
                <button class="color-dot" data-color="#ef4444" style="background: #ef4444;"></button>
                <button class="color-dot" data-color="#f59e0b" style="background: #f59e0b;"></button>
                <button class="color-dot" data-color="#10b981" style="background: #10b981;"></button>
                <button class="color-dot" data-color="#06b6d4" style="background: #06b6d4;"></button>
                <button class="color-dot active" data-color="#3b82f6" style="background: #3b82f6;"></button>
                <button class="color-dot" data-color="#8b5cf6" style="background: #8b5cf6;"></button>
                <button class="color-dot" data-color="#ec4899" style="background: #ec4899;"></button>
                
                <div class="custom-color-wrapper">
                    <input type="color" id="custom-color-picker" value="#3b82f6">
                </div>

                <div class="vertical-divider"></div>

                <div class="shape-selector">
                    <button class="shape-btn active" data-shape="circle" title="Circle">○</button>
                    <button class="shape-btn" data-shape="square" title="Square">□</button>
                    <button class="shape-btn" data-shape="triangle" title="Triangle">△</button>
                    <button class="shape-btn" data-shape="star" title="Star">★</button>
                    <button class="shape-btn" data-shape="cross" title="Cross">＋</button>
                </div>

                <div class="vertical-divider"></div>

                <div class="gradient-system-wrapper">
                    <button id="gradient-menu-toggle-btn" class="gradient-toggle-btn" title="Toggle Gradient">▧</button>
                    <div id="gradient-popover" class="gradient-popover closed" onclick="event.stopPropagation()">
                        <div class="gradient-popover-header">
                            <span>GRADIENT</span>
                            <button id="add-gradient-color-btn" class="gradient-add-btn">＋</button>
                        </div>
                        <div id="gradient-pickers-container" class="gradient-pickers-list"></div>
                        <div class="gradient-popover-footer">
                            <button id="apply-gradient-btn" class="gradient-apply-btn">APPLY</button>
                        </div>
                    </div>
                </div>

                <div class="brush-system-wrapper" style="position: relative;">
                    <button id="brush-menu-toggle-btn" class="gradient-toggle-btn" title="Select Brush">🖌</button>
                    
                    <div id="brush-popover" class="gradient-popover closed" onclick="event.stopPropagation()">
                        <div class="gradient-popover-header">
                            <span>BRUSHES</span>
                        </div>
                        <div class="brush-selector-popover">
                            <button class="brush-btn active" data-brush="normal" title="Normal Brush">NORMAL</button>
                            <button class="brush-btn" data-brush="random" title="Random Spray">RANDOM</button>
                            <button class="brush-btn" data-brush="explode" title="Explosion">EXPLODE</button>
                            <button class="brush-btn" data-brush="meteor" title="Meteor Brush">METEOR</button>
                            <button class="brush-btn" data-brush="rain" title="Rain Brush">RAIN</button>
                        </div>
                    </div>
                </div>

                <button id="blackhole-toggle-btn" class="gradient-toggle-btn" title="BlackHole">🕳️</button>
            </div>

            <div class="palette-divider"></div>

            <div class="palette-row">
                <div class="slider-container">
                    <span class="slider-label">OPACITY</span>
                    <span class="slider-sign">-</span>
                    <div class="opacity-slider-wrapper" style="width: 60px;">
                        <input type="range" id="main-opacity-slider" min="0" max="100" value="100">
                    </div>
                    <span class="slider-sign">+</span>
                </div>

                <div class="vertical-divider"></div>

                <div class="slider-container">
                    <span class="slider-label">BRUSH SIZE</span>
                    <span class="slider-sign">-</span>
                    <div class="brush-size-slider-wrapper" style="width: 60px;">
                        <input type="range" id="brush-size-slider" min="10" max="100" value="30">
                    </div>
                    <span class="slider-sign">+</span>
                </div>

                <div class="vertical-divider"></div>

                <div class="slider-container">
                    <span class="slider-label">TIME</span>
                    <span class="slider-sign">-</span>
                    <div class="time-slider-wrapper">
                        <input type="range" id="particle-lifetime-slider" min="1" max="10" value="5">
                    </div>
                    <span class="slider-sign">+</span>
                </div>

                <div class="vertical-divider"></div>

                <div class="slider-container">
                    <span class="slider-label">COUNT</span>
                    <span class="slider-sign">-</span>
                    <div class="count-slider-wrapper">
                        <input type="range" id="particle-count-slider" min="1" max="10" value="3">
                    </div>
                    <span class="slider-sign">+</span>
                </div>

                <div class="vertical-divider"></div>

                <div class="slider-container">
                    <span class="slider-label">SIZE</span>
                    <span class="slider-sign">-</span>
                    <div class="size-slider-wrapper">
                        <input type="range" id="particle-size-slider" min="1" max="10" value="4">
                    </div>
                    <span class="slider-sign">+</span>
                </div>

                <div class="vertical-divider"></div>

                <div class="slider-container">
                    <span class="slider-label">SPEED</span>
                    <span class="slider-sign">-</span>
                    <div class="speed-slider-wrapper">
                        <input type="range" id="particle-speed-slider" min="1" max="10" value="5">
                    </div>
                    <span class="slider-sign">+</span>
                </div>
            </div>
        </div>

        <canvas id="relax-canvas"></canvas>
        <div class="canvas-hint">Click and drag your mouse to paint</div>
    </div>

    <div id="name-modal" class="modal hidden">
        <div class="card">
            <h1>Change Name</h1>
            <input type="text" id="new-username-input" placeholder="Enter new name">
            <div class="modal-buttons">
                <button id="save-name-btn">Save</button>
                <button id="cancel-name-btn" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="layout-modal" class="modal hidden">
        <div class="card layout-card">
            <h1>Layout Presets</h1>
            
            <div class="save-layout-form">
                <input type="text" id="layout-name-input" placeholder="Layout Name...">
                <button id="save-layout-btn">Save Current</button>
            </div>

            <div class="palette-divider" style="margin: 15px 0;"></div>

            <div id="layouts-list" class="layouts-list-container">
            </div>

            <div class="modal-buttons" style="margin-top: 15px;">
                <button id="close-layout-btn" class="cancel-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="src/js/fps.js"></script>
    <script src="src/js/shortcuts.js"></script>
    <script src="src/js/brush.js"></script>
    <script src="src/js/blackhole.js"></script> 
    <script src="src/js/main.js"></script>
    <script src="src/js/storage.js"></script>
    <script src="src/js/time.js"></script>
    <script src="src/js/version.js"></script>
</body>
</html>
